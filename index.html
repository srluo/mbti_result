<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MBTI 測驗結果</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <div class="badge">MBTI Result Card</div>
    <h1 id="title">載入中…</h1>
    <div class="small">點擊卡片即可翻面（支援滑動 / Space）</div>
  </div>

  <div class="card" id="card">
    <div class="card-inner">
      <div class="face front"><img id="frontImg" alt="front" /></div>
      <div class="face back"><img id="backImg" alt="back" /></div>
    </div>
  </div>

  <div class="footer">
    <div class="controls">
      <label for="typeSelect" class="small">切換 MBTI 類型：</label>
      <select id="typeSelect" class="btn secondary" style="appearance:auto; color:white;">
        <option value="ISTJ">ISTJ</option>
        <option value="ISFJ">ISFJ</option>
        <option value="INFJ">INFJ</option>
        <option value="INTJ">INTJ</option>
        <option value="ISTP">ISTP</option>
        <option value="ISFP">ISFP</option>
        <option value="INFP">INFP</option>
        <option value="INTP">INTP</option>
        <option value="ESTP">ESTP</option>
        <option value="ESFP">ESFP</option>
        <option value="ENFP">ENFP</option>
        <option value="ENTP">ENTP</option>
        <option value="ESTJ">ESTJ</option>
        <option value="ESFJ">ESFJ</option>
        <option value="ENFJ">ENFJ</option>
        <option value="ENTJ">ENTJ</option>
      </select>
    </div>
  </div>

  <script src="types.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    let currentType = (qs.get('type') || 'ESTP').toUpperCase();
    const frontOverride = qs.get('front');
    const backOverride  = qs.get('back');

    const title = document.getElementById('title');
    const frontImg = document.getElementById('frontImg');
    const backImg  = document.getElementById('backImg');
    const card = document.getElementById('card');
    const typeSelect = document.getElementById('typeSelect');

    function loadType(type) {
      const config = (window.MBTI_IMAGES && window.MBTI_IMAGES[type]) || null;

      if (!config && !frontOverride) {
        title.textContent = `無法辨識的 MBTI 類型：${type}`;
        frontImg.removeAttribute('src');
        backImg.removeAttribute('src');
        return;
      }

      currentType = type;
      title.textContent = `你的 MBTI：${type}`;

      const frontURL = frontOverride || config.front;
      const backURL = backOverride || config.back || frontOverride || config.front;

      frontImg.src = frontURL;
      backImg.src = backURL;

      // 預載
      [frontURL, backURL].forEach(src => {
        const i = new Image();
        i.src = src;
      });

      // 切換類型時自動回到正面
      card.classList.remove('flipped');

      // 更新網址參數，但不重整頁面
      const newUrl = `${location.pathname}?type=${type}`;
      history.replaceState({}, '', newUrl);
    }

    // 初始化下拉
    typeSelect.value = currentType;
    loadType(currentType);

    // 選單切換
    typeSelect.addEventListener('change', (e) => {
      loadType(e.target.value);
    });

    // 翻面互動
    function toggleFlip() {
      card.classList.toggle('flipped');
    }

    card.addEventListener('click', toggleFlip);

    window.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleFlip();
      }
    });

    // 簡單的左右滑動翻面
    let startX = null;
    card.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });

    card.addEventListener('touchend', e => {
      if (startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) toggleFlip();
      startX = null;
    });
  </script>
</body>
</html>
